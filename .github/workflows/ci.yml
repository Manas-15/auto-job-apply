name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # CI only typechecks/builds — no browser needed, skip the ~150MB download.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Generate Prisma client
        run: npm run db:generate --workspace @aja/api

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build-time public API URL for the web app (runtime can override).
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
