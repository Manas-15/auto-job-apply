# Local Postgres for development. `npm run db:up` starts it.
# In production, point DATABASE_URL at a managed Postgres (e.g. Supabase).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aja
      POSTGRES_PASSWORD: aja
      POSTGRES_DB: resume_builder
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
