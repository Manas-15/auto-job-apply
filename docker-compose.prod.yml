# Full-stack "live" deploy on a single server (VPS, cloud VM, etc.):
#   cp .env.prod.example .env.prod   # fill in your AI key(s)
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Frontend on :3000, backend on :4000, Postgres + Redis internal.
# Note: the Naukri scraper still can't run here (headed browser + your
# session); use it locally. Everything else runs live.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aja
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aja}
      POSTGRES_DB: auto_job_apply
    volumes:
      - aja-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aja -d auto_job_apply']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - aja-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://aja:${POSTGRES_PASSWORD:-aja}@postgres:5432/auto_job_apply?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # "*" reflects any origin — fine for a single-owner self-hosted box.
      # Lock it to your real frontend URL for a public deployment.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JOB_FINDER_ENABLED: ${JOB_FINDER_ENABLED:-false}
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Leave empty to auto-target <host>:4000 from the browser, or set to
        # your backend's public URL (e.g. https://api.example.com).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  aja-pgdata:
  aja-redisdata:
